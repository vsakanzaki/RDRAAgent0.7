<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RDRA Func Spec - Call Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column;
      font-family: "Yu Gothic UI", "Meiryo", "Hiragino Sans", system-ui, sans-serif;
      background: #f1f5f9; color: #0f172a; font-size: 12px;
    }
    .header {
      flex: 0 0 auto; background: #ffffff; border-bottom: 1px solid #cbd5e1;
      padding: 8px 14px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .title { font-size: 14px; font-weight: 700; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: #334155; }
    .legendItem { display: inline-flex; align-items: center; gap: 5px; }
    .legendItem svg { width: 22px; height: 14px; }
    .headerSpacer { flex: 1 1 auto; }
    .closeBtn {
      border: 1px solid #cbd5e1; background: #ffffff; color: #475569;
      width: 28px; height: 24px; border-radius: 4px; cursor: pointer;
      font-size: 16px; line-height: 1; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .closeBtn:hover { background: #fee2e2; color: #991b1b; border-color: #f87171; }
    .main {
      flex: 1 1 auto; display: grid;
      grid-template-columns: var(--colTree, 260px) 6px minmax(0, 1fr);
      min-height: 0;
    }
    .rightStack {
      min-width: 0; min-height: 0;
      display: grid;
      grid-template-rows: var(--rowDiagram, 1fr) 6px minmax(0, 1fr);
    }
    .pane { min-height: 0; min-width: 0; overflow: hidden; display: flex; flex-direction: column; background: #ffffff; }
    .splitter { background: #e2e8f0; user-select: none; touch-action: none; }
    .splitter:hover, .splitter.dragging { background: #94a3b8; }
    .splitter-v { cursor: col-resize; }
    .splitter-h { cursor: row-resize; }
    .paneHeader {
      flex: 0 0 auto; padding: 6px 10px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: 11px; color: #475569;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .paneBody { flex: 1 1 auto; overflow: auto; min-height: 0; }

    /* TreeView */
    #tree { padding: 6px 4px 12px 4px; font-size: 12px; }
    #tree ul { list-style: none; padding-left: 14px; margin: 0; }
    #tree > ul { padding-left: 4px; }
    #tree li { line-height: 1.5; white-space: nowrap; }
    #tree .row {
      display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px;
      border-radius: 3px; cursor: pointer; user-select: none;
    }
    #tree .row:hover { background: #e0f2fe; }
    #tree .row.selected { background: #bae6fd; }
    #tree .caret {
      display: inline-block; width: 10px; text-align: center; color: #64748b; font-size: 10px;
    }
    #tree .caret.empty { visibility: hidden; }
    #tree li.collapsed > ul { display: none; }
    #tree .icon { display: inline-block; width: 14px; text-align: center; }
    #tree .label { color: #0f172a; }
    #tree .group { font-weight: 700; color: #1e293b; }
    #tree .sub { font-weight: 600; color: #334155; }

    /* Diagram pane */
    #diagramPane { background: #f8fafc; }
    #cy { flex: 1 1 auto; min-height: 0; background: #f1f5f9; }
    #focusInfo { font-size: 11px; color: #475569; }

    /* File viewer */
    #viewer { width: 100%; height: 100%; resize: none; border: 0; padding: 10px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px; line-height: 1.5; background: #fafafa; color: #0f172a;
      white-space: pre; overflow: auto;
    }
    .empty { color: #94a3b8; padding: 12px; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">RDRA Func Spec — Call Graph</div>
    <div class="legend" id="legend"></div>
    <div class="headerSpacer"></div>
    <button class="closeBtn" id="closeBtn" type="button" title="Close (サーバー停止)">×</button>
  </div>
  <div class="main">
    <div class="pane">
      <div class="paneHeader">データBrowser</div>
      <div class="paneBody"><div id="tree"></div></div>
    </div>
    <div class="splitter splitter-v" id="splitV"></div>
    <div class="rightStack">
      <div class="pane" id="diagramPane">
        <div class="paneHeader">
          <span>Diagram view</span>
          <span id="focusInfo">アイテムをクリックしてください</span>
        </div>
        <div id="cy"></div>
      </div>
      <div class="splitter splitter-h" id="splitH"></div>
      <div class="pane">
        <div class="paneHeader">
          <span>File Viewer</span>
          <span id="viewerPath" style="font-weight:400;color:#64748b;"></span>
        </div>
        <div class="paneBody" style="background:#fafafa;">
          <textarea id="viewer" readonly placeholder="ファイル未選択"></textarea>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    // ---------- Legend (SVG icons inline) ----------
    function legendSvg(shape, opts) {
      const stroke = opts.stroke || '#0f172a';
      const fill = opts.fill || '#ffffff';
      const dash = opts.dash || '';
      const inner = (() => {
        const sw = 1.6;
        const da = dash ? `stroke-dasharray="${dash}"` : '';
        if (shape === 'rect') return `<rect x="2" y="3" width="18" height="8" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" ${da} rx="1.5"/>`;
        if (shape === 'ellipse') return `<ellipse cx="11" cy="7" rx="9" ry="5" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" ${da}/>`;
        if (shape === 'hex') return `<polygon points="3,7 6,2.5 16,2.5 19,7 16,11.5 6,11.5" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" ${da}/>`;
        if (shape === 'tri') return `<polygon points="11,2.5 19,11.5 3,11.5" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" ${da}/>`;
        return '';
      })();
      return `<svg viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
    }
    const legendItems = [
      { svg: legendSvg('rect',   { fill: '#dbeafe', stroke: '#1d4ed8' }),                label: '画面' },
      { svg: legendSvg('rect',   { fill: '#ffffff', stroke: '#475569', dash: '1 2' }),    label: 'BUC' },
      { svg: legendSvg('ellipse',{ fill: '#fef3c7', stroke: '#b45309' }),                label: 'UC' },
      { svg: legendSvg('tri',    { fill: '#ffffff', stroke: '#b45309' }),                label: '△ APIエンドポイント（UC内）' },
      { svg: legendSvg('rect',   { fill: '#ffffff', stroke: '#475569', dash: '4 2' }),    label: 'コンテキスト' },
      { svg: legendSvg('hex',    { fill: '#cffafe', stroke: '#0e7490' }),                label: 'サービス' },
      { svg: legendSvg('rect',   { fill: '#dcfce7', stroke: '#166534' }),                label: 'entity' }
    ];
    document.getElementById('legend').innerHTML = legendItems
      .map(i => `<span class="legendItem">${i.svg}<span>${i.label}</span></span>`)
      .join('');

    // ---------- State ----------
    let DATA = null;
    const byId = new Map();
    const serviceToUcs = new Map();
    const entityToServices = new Map();
    const endpointToUcs = new Map();
    let cy = null;
    let lastFocus = null;

    function addRev(map, key, value) {
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(value);
    }

    function normalizePath(path) {
      const p0 = String(path || '').trim();
      if (!p0) return '';
      let p = p0.startsWith('/') ? p0 : ('/' + p0);
      if (p.length > 1) p = p.replace(/\/+$/, '');
      return p;
    }

    function endpointKey(method, path) {
      const m = String(method || '').trim().toUpperCase();
      const p = normalizePath(path);
      if (!m || !p) return '';
      return m + ' ' + p;
    }

    function collectUcEndpointKeys(uc) {
      const keys = [];
      for (const ep of (uc.endpoints || [])) {
        const key = endpointKey(ep.method, ep.path);
        if (key) keys.push(key);
      }
      return Array.from(new Set(keys));
    }

    function collectScreenApiKeys(screen) {
      const keys = [];
      for (const api of (screen.apis || [])) {
        const key = endpointKey(api.method, api.path);
        if (key) keys.push(key);
      }
      return Array.from(new Set(keys));
    }

    function indexData(d) {
      byId.clear(); serviceToUcs.clear(); entityToServices.clear(); endpointToUcs.clear();
      for (const c of d.contexts || [])  byId.set(c.id, Object.assign({ kind: 'context' }, c));
      for (const s of d.services || [])  byId.set(s.id, Object.assign({ kind: 'service' }, s));
      for (const e of d.entities || [])  byId.set(e.id, Object.assign({ kind: 'entity' },  e));
      for (const b of d.appBucs || [])   byId.set(b.id, Object.assign({ kind: 'appbuc' },  b));
      for (const u of d.ucs || [])       byId.set(u.id, Object.assign({ kind: 'uc' },      u));
      for (const b of d.uiBucs || [])    byId.set(b.id, Object.assign({ kind: 'uibuc' },   b));
      for (const s of d.screens || [])   byId.set(s.id, Object.assign({ kind: 'screen' },  s));
      for (const u of d.ucs || []) {
        for (const sid of u.services || []) addRev(serviceToUcs, sid, u.id);
        for (const key of collectUcEndpointKeys(u)) addRev(endpointToUcs, key, u.id);
      }
      for (const s of d.services || []) {
        for (const eid of s.entities || []) addRev(entityToServices, eid, s.id);
      }
      for (const screen of d.screens || []) {
        const apiKeys = collectScreenApiKeys(screen);
        if (apiKeys.length > 0) {
          const resolved = [];
          for (const key of apiKeys) {
            for (const ucId of endpointToUcs.get(key) || []) resolved.push(ucId);
          }
          screen.ucs = Array.from(new Set(resolved));
        }
      }
    }

    // ---------- TreeView ----------
    function renderTree() {
      const root = document.getElementById('tree');
      root.innerHTML = '';
      const ul = document.createElement('ul');

      // UI group
      ul.appendChild(treeGroup('UI', DATA.uiBucs.map(buc => {
        return treeNode(buc.label, buc.id, 'sub', buc.screens.map(sid => {
          const s = byId.get(sid);
          return s ? leafNode(s.label + '.md', s.id) : null;
        }).filter(Boolean));
      })));

      // Application group
      ul.appendChild(treeGroup('Application', DATA.appBucs.map(buc => {
        return treeNode(buc.label + '.md', buc.id, 'sub', buc.ucs.map(uid => {
          const u = byId.get(uid);
          return u ? leafNode(u.label, u.id) : null;
        }).filter(Boolean));
      })));

      // Domain group
      ul.appendChild(treeGroup('Domain', DATA.contexts.map(ctx => {
        return leafNode(ctx.label + '.md', ctx.id);
      })));

      root.appendChild(ul);
    }

    function treeGroup(label, children) {
      const li = document.createElement('li');
      const row = document.createElement('span');
      row.className = 'row';
      row.innerHTML = `<span class="caret">▾</span><span class="label group">${label}</span>`;
      li.appendChild(row);
      const ul = document.createElement('ul');
      for (const c of children) if (c) ul.appendChild(c);
      li.appendChild(ul);
      row.addEventListener('click', () => li.classList.toggle('collapsed'));
      return li;
    }

    function treeNode(label, id, cls, children) {
      const li = document.createElement('li');
      const row = document.createElement('span');
      row.className = 'row';
      row.dataset.id = id;
      const hasChildren = children && children.length > 0;
      row.innerHTML = `<span class="caret${hasChildren ? '' : ' empty'}">${hasChildren ? '▾' : ''}</span><span class="label ${cls || ''}">${label}</span>`;
      li.appendChild(row);
      if (hasChildren) {
        const ul = document.createElement('ul');
        for (const c of children) ul.appendChild(c);
        li.appendChild(ul);
      }
      row.addEventListener('click', (ev) => {
        if (ev.target.classList.contains('caret') && hasChildren) {
          li.classList.toggle('collapsed');
        } else {
          selectInTree(row);
          focusOn(id);
        }
        ev.stopPropagation();
      });
      return li;
    }

    function leafNode(label, id) {
      const li = document.createElement('li');
      const row = document.createElement('span');
      row.className = 'row';
      row.dataset.id = id;
      row.innerHTML = `<span class="caret empty"></span><span class="label">${label}</span>`;
      li.appendChild(row);
      row.addEventListener('click', (ev) => {
        selectInTree(row);
        focusOn(id);
        ev.stopPropagation();
      });
      return li;
    }

    function selectInTree(row) {
      document.querySelectorAll('#tree .row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
    }

    // ---------- Subgraph builder ----------
    function buildSubgraph(focusId) {
      const node = byId.get(focusId);
      if (!node) return null;
      const selected = new Set();
      const edgePairs = []; // {source,target,kind}

      const add = (id) => { if (id && byId.has(id)) selected.add(id); };
      const link = (s, t, k) => { if (selected.has(s) && selected.has(t)) edgePairs.push({ source: s, target: t, kind: k }); };
      const expandUcDownstream = (ucId) => {
        const u = byId.get(ucId); if (!u) return;
        add(ucId);
        for (const sid of u.services || []) {
          add(sid);
          link(ucId, sid, 'uc-svc');
          const sv = byId.get(sid);
          for (const eid of sv?.entities || []) {
            add(eid); link(sid, eid, 'svc-ent');
          }
        }
      };
      const expandScreenForward = (screenId) => {
        const sc = byId.get(screenId); if (!sc) return;
        add(screenId);
        for (const uid of sc.ucs || []) {
          add(uid); link(screenId, uid, 'sc-apiuc');
          expandUcDownstream(uid);
        }
      };
      const expandServiceUpstream = (svcId) => {
        const sv = byId.get(svcId); if (!sv) return;
        add(svcId);
        for (const uid of serviceToUcs.get(svcId) || []) {
          add(uid); link(uid, svcId, 'uc-svc');
          const u = byId.get(uid);
          for (const screenId of u?.screens || []) {
            add(screenId); link(screenId, uid, 'sc-apiuc');
          }
        }
      };

      switch (node.kind) {
        case 'screen':
          expandScreenForward(focusId); break;
        case 'uc': {
          add(focusId);
          expandUcDownstream(focusId);
          for (const screenId of node.screens || []) {
            add(screenId); link(screenId, focusId, 'sc-apiuc');
          }
          break;
        }
        case 'service': {
          expandServiceUpstream(focusId);
          for (const eid of node.entities || []) {
            add(eid); link(focusId, eid, 'svc-ent');
          }
          break;
        }
        case 'entity': {
          add(focusId);
          for (const sid of entityToServices.get(focusId) || []) {
            add(sid); link(sid, focusId, 'svc-ent');
            expandServiceUpstream(sid);
          }
          break;
        }
        case 'context': {
          for (const sid of node.services || []) {
            expandServiceUpstream(sid);
          }
          for (const eid of node.entities || []) {
            add(eid);
            for (const sid of entityToServices.get(eid) || []) {
              if (selected.has(sid)) link(sid, eid, 'svc-ent');
            }
          }
          break;
        }
        case 'appbuc': {
          for (const uid of node.ucs || []) {
            expandUcDownstream(uid);
            const u = byId.get(uid);
            for (const screenId of u?.screens || []) {
              add(screenId); link(screenId, uid, 'sc-apiuc');
            }
          }
          break;
        }
        case 'uibuc': {
          for (const screenId of node.screens || []) {
            expandScreenForward(screenId);
          }
          break;
        }
      }

      // Add compound parents:
      //   - appbuc contains its UCs
      //   - context contains its services + entities
      // (uibuc is intentionally not shown as compound; screens are top-level.)
      const parentMap = {};
      for (const id of [...selected]) {
        const n = byId.get(id);
        if (!n) continue;
        if (n.kind === 'uc' && n.buc) {
          selected.add(n.buc);
          parentMap[id] = n.buc;
        } else if ((n.kind === 'service' || n.kind === 'entity') && n.context) {
          selected.add(n.context);
          parentMap[id] = n.context;
        }
      }
      // If focus is appbuc/context itself, ensure it is included
      if (node.kind === 'appbuc' || node.kind === 'context') selected.add(focusId);

      // Materialize Cytoscape elements
      const elements = [];
      for (const id of selected) {
        const n = byId.get(id);
        if (!n) continue;
        const data = {
          id,
          label: labelFor(n),
          kind: n.kind,
          isFocus: id === focusId
        };
        if (parentMap[id]) data.parent = parentMap[id];
        elements.push({ data });
      }
      const seen = new Set();
      let edgeSeq = 0;
      for (const ep of edgePairs) {
        const k = ep.source + '\x1f' + ep.target + '\x1f' + ep.kind;
        if (seen.has(k)) continue;
        seen.add(k);
        elements.push({
          data: { id: 'e' + (++edgeSeq), source: ep.source, target: ep.target, kind: ep.kind }
        });
      }
      return { elements, focusId };
    }

    function labelFor(n) {
      if (n.kind === 'uc') {
        const lines = [];
        lines.push(n.label || '');
        if (n.labelJa) lines.push(n.labelJa);
        const eps = (n.endpoints || [])
          .map(ep => ep && ep.label ? ep.label : ('△ ' + endpointKey(ep?.method, ep?.path)))
          .filter(Boolean);
        for (const epLine of eps) lines.push(epLine);
        return lines.filter(Boolean).join('\n');
      }
      if (n.kind === 'entity') return n.label;
      if (n.labelJa) return n.label + '\n' + n.labelJa;
      return n.label;
    }

    // ---------- Cytoscape ----------
    function initCy() {
      cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [],
        wheelSensitivity: 0.2,
        style: [
          { selector: 'node', style: {
            label: 'data(label)', 'text-wrap': 'wrap', 'text-max-width': 160,
            'font-size': '10px', color: '#0f172a',
            'text-valign': 'center', 'text-halign': 'center',
            'border-width': 1.6, 'background-color': '#ffffff'
          } },
          { selector: "node[kind='screen']", style: {
            shape: 'rectangle', 'background-color': '#dbeafe',
            'border-color': '#1d4ed8', width: 140, height: 48
          } },
          { selector: "node[kind='uc']", style: {
            shape: 'ellipse', 'background-color': '#fef3c7',
            'border-color': '#b45309', width: 210, height: 110, 'font-size': '9px',
            'text-max-width': 200
          } },
          { selector: "node[kind='service']", style: {
            shape: 'hexagon', 'background-color': '#cffafe',
            'border-color': '#0e7490', width: 150, height: 52, 'font-size': '9px'
          } },
          { selector: "node[kind='entity']", style: {
            shape: 'rectangle', 'background-color': '#dcfce7',
            'border-color': '#166534', width: 120, height: 44
          } },
          { selector: "node[kind='appbuc']", style: {
            shape: 'rectangle',
            'background-color': '#f8fafc', 'background-opacity': 0.5,
            'border-color': '#475569', 'border-style': 'dotted', 'border-width': 2,
            'font-size': '11px', 'font-weight': 'bold',
            'text-valign': 'top', 'text-halign': 'center', 'text-margin-y': -4,
            padding: 18
          } },
          { selector: "node[kind='context']", style: {
            shape: 'rectangle',
            'background-color': '#f5f3ff', 'background-opacity': 0.5,
            'border-color': '#6d28d9', 'border-style': 'dashed', 'border-width': 2,
            'font-size': '11px', 'font-weight': 'bold',
            'text-valign': 'top', 'text-halign': 'center', 'text-margin-y': -4,
            padding: 18
          } },
          { selector: "node[kind='uibuc']", style: {
            shape: 'rectangle', 'background-color': '#ffffff',
            'border-color': '#475569', 'border-style': 'dotted', 'border-width': 2,
            width: 160, height: 46, 'font-size': '11px', 'font-weight': 'bold'
          } },
          { selector: "node[?isFocus]", style: {
            'border-width': 3.5, 'border-color': '#dc2626'
          } },
          { selector: 'edge', style: {
            width: 1.4, 'line-color': '#64748b',
            'target-arrow-color': '#64748b', 'target-arrow-shape': 'triangle',
            'curve-style': 'bezier', opacity: 0.85
          } },
          { selector: "edge[kind='sc-apiuc']",  style: { 'line-color': '#1d4ed8', 'target-arrow-color': '#1d4ed8' } },
          { selector: "edge[kind='uc-svc']", style: { 'line-color': '#b45309', 'target-arrow-color': '#b45309' } },
          { selector: "edge[kind='svc-ent']",style: { 'line-color': '#0e7490', 'target-arrow-color': '#0e7490' } }
        ]
      });

      cy.on('tap', 'node', (ev) => {
        const id = ev.target.data('id');
        focusOn(id);
        const row = document.querySelector(`#tree .row[data-id="${cssEscape(id)}"]`);
        if (row) selectInTree(row);
      });
    }

    function cssEscape(s) {
      // For attribute-value contexts: escape only " and \
      return String(s).replace(/(["\\])/g, '\\$1');
    }
    function cySelEscape(s) {
      // For Cytoscape selectors (CSS-like): escape :, ., and \
      return String(s).replace(/([:.\\])/g, '\\$1');
    }

    function renderDiagram(sub) {
      cy.elements().remove();
      cy.add(sub.elements);
      const positions = computePresetPositions(sub.elements);
      cy.layout({
        name: 'preset',
        positions: (n) => positions[n.id()] || { x: 0, y: 0 },
        fit: true, padding: 28, animate: false
      }).run();
      const focusInfo = document.getElementById('focusInfo');
      const node = byId.get(sub.focusId);
      focusInfo.textContent = node
        ? `${kindLabel(node.kind)}: ${node.label}${node.labelJa ? ' / ' + node.labelJa : ''}`
        : '';
    }

    function kindLabel(k) {
      return ({
        screen: '画面', uc: 'UC', service: 'サービス', entity: 'entity',
        context: 'コンテキスト', appbuc: 'BUC(application)', uibuc: 'BUC(ui)'
      })[k] || k;
    }

    // 4-column preset: screen | uc(in BUC) | service(in context) | entity(in context)
    function computePresetPositions(elements) {
      const colByKind = { screen: 0, uc: 1, service: 2, entity: 3 };
      const colWidth = 240;
      const rowHeight = 78;
      const groupGap = 26;
      const buckets = { 0: new Map(), 1: new Map(), 2: new Map(), 3: new Map() };
      for (const el of elements) {
        if (el.data.source !== undefined) continue; // skip edges
        const k = el.data.kind;
        if (!(k in colByKind)) continue;            // skip compound parents
        const col = colByKind[k];
        const parent = el.data.parent || '';
        const map = buckets[col];
        if (!map.has(parent)) map.set(parent, []);
        map.get(parent).push(el.data.id);
      }
      const positions = {};
      for (const colStr of ['0', '1', '2', '3']) {
        const col = parseInt(colStr, 10);
        const map = buckets[col];
        let y = 0, firstGroup = true;
        for (const [, ids] of map) {
          if (!firstGroup) y += groupGap;
          firstGroup = false;
          for (const id of ids) {
            positions[id] = { x: col * colWidth, y };
            y += rowHeight;
          }
        }
      }
      return positions;
    }

    // ---------- Focus dispatcher ----------
    async function focusOn(id) {
      const node = byId.get(id);
      if (!node) return;
      lastFocus = id;
      const sub = buildSubgraph(id);
      if (sub) renderDiagram(sub);
      await loadFileForNode(node);
    }

    // ---------- File viewer ----------
    async function loadFileForNode(node) {
      let path = null;
      if (node.kind === 'screen' || node.kind === 'context' || node.kind === 'appbuc') {
        path = node.filePath;
      } else if (node.kind === 'uc') {
        const buc = byId.get(node.buc);
        path = buc?.filePath || null;
      } else if (node.kind === 'service' || node.kind === 'entity') {
        const ctx = byId.get(node.context);
        path = ctx?.filePath || null;
      } else if (node.kind === 'uibuc') {
        // UI BUC = folder, no specific file
        path = null;
      }
      const viewer = document.getElementById('viewer');
      const pathLabel = document.getElementById('viewerPath');
      if (!path) {
        viewer.value = '';
        pathLabel.textContent = '(該当ファイルなし)';
        return;
      }
      pathLabel.textContent = path;
      const fetchPath = path
        .replace(/^[/\\]+/, '')
        .replace(/\\/g, '/')
        .split('/')
        .map(encodeURIComponent)
        .join('/');
      try {
        const res = await fetch('/' + fetchPath, { cache: 'no-store' });
        if (!res.ok) {
          viewer.value = `[読込失敗] HTTP ${res.status} — ${fetchPath}`;
          return;
        }
        viewer.value = await res.text();
        viewer.scrollTop = 0;
      } catch (err) {
        viewer.value = `[読込失敗] ${err && err.message ? err.message : err}`;
      }
    }
    // ---------- Boot ----------
    async function boot() {
      try {
        const res = await fetch('/callgraph_data.json', { cache: 'no-store' });
        if (!res.ok) {
          showFatal(`callgraph_data.json の読込に失敗しました (HTTP ${res.status})。`);
          return;
        }
        DATA = await res.json();
      } catch (err) {
        showFatal('callgraph_data.json の読込に失敗しました: ' + (err && err.message || err));
        return;
      }
      indexData(DATA);
      renderTree();
      initCy();
    }

    function showFatal(msg) {
      document.getElementById('tree').innerHTML = `<div class="empty">${escHtml(msg)}</div>`;
      document.getElementById('focusInfo').textContent = 'データ未読込';
    }
    function escHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    // ---------- Close button (stop server + close window) ----------
    document.getElementById('closeBtn').addEventListener('click', async () => {
      try { await fetch('/__shutdown', { method: 'POST', cache: 'no-store' }); } catch (_) {}
      window.close();
      setTimeout(() => {
        document.body.innerHTML =
          '<div style="padding:24px;font:14px sans-serif;color:#64748b;">'
          + 'サーバーを停止しました。このタブを閉じてください。</div>';
      }, 250);
    });

    // ---------- Resize splitters ----------
    function dragSplitter(el, axis, apply) {
      el.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        try { el.setPointerCapture(ev.pointerId); } catch (_) {}
        el.classList.add('dragging');
        const onMove = (e) => apply(axis === 'x' ? e.clientX : e.clientY);
        const onUp = () => {
          el.removeEventListener('pointermove', onMove);
          el.removeEventListener('pointerup', onUp);
          el.removeEventListener('pointercancel', onUp);
          el.classList.remove('dragging');
          try { el.releasePointerCapture(ev.pointerId); } catch (_) {}
          if (cy) cy.fit(undefined, 28);
        };
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
        el.addEventListener('pointercancel', onUp);
      });
    }
    const main = document.querySelector('.main');
    const rightStack = document.querySelector('.rightStack');
    dragSplitter(document.getElementById('splitV'), 'x', (clientX) => {
      const r = main.getBoundingClientRect();
      const w = Math.max(140, Math.min(r.width - 240, clientX - r.left));
      main.style.setProperty('--colTree', w + 'px');
    });
    dragSplitter(document.getElementById('splitH'), 'y', (clientY) => {
      const r = rightStack.getBoundingClientRect();
      const h = Math.max(120, Math.min(r.height - 120, clientY - r.top));
      rightStack.style.setProperty('--rowDiagram', h + 'px');
    });

    // Keep Cytoscape canvas in sync with the diagram pane size
    const cyContainer = document.getElementById('cy');
    if (typeof ResizeObserver === 'function') {
      new ResizeObserver(() => { if (cy) cy.resize(); }).observe(cyContainer);
    } else {
      window.addEventListener('resize', () => { if (cy) cy.resize(); });
    }

    boot();
  })();
  </script>
</body>
</html>

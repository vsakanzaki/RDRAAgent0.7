<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画面照会（BUC / アクター）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      padding: 18px;
      min-height: 100vh;
      color: #222;
    }

    .window {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      overflow: hidden;
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 36px);
    }

    .window-header {
      background: linear-gradient(to bottom, #f0f0f0, #e6e6e6);
      border-bottom: 1px solid #d0d0d0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title {
      font-size: 14px;
      color: #555;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .title strong { color: #222; font-size: 15px; }
    .subtle { color: #777; font-size: 12px; }

    .close-button {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: .2s;
      white-space: nowrap;
    }
    .close-button:hover { background: #c82333; }

    .mode-tabs {
      background: #f9f9f9;
      border-bottom: 6px solid #008cff;
      padding: 10px 12px 0 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .tab {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 9px 18px;
      cursor: pointer;
      color: #666;
      font-size: 15px;
      transition: .2s;
      user-select: none;
    }
    .tab:hover:not(.active) { background: #f0f0f0; }
    .tab.active {
      background: #008cff;
      border-color: #008cff;
      color: #fff;
    }

    .main {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 520px;
      flex: 1;
      overflow: hidden;
    }

    .tree-pane {
      background: #fafafa;
      border-right: 1px solid #e6e6e6;
      padding: 12px;
      overflow: auto;
    }

    .body-pane {
      background: #fff;
      overflow: hidden;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .screen-list {
      border-right: 1px solid #ececec;
      background: #fcfcfc;
      padding: 10px;
      overflow: auto;
    }

    .screen-detail {
      padding: 12px;
      overflow: auto;
    }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    /* TreeView */
    .tree ul { list-style: none; padding-left: 16px; }
    .tree li { margin: 4px 0; }
    .node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }
    .node:hover { background: #eef6ff; }
    .node.selected { background: #e6f4ff; border: 1px solid #b9ddff; }
    .twisty {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #666;
      background: #fff;
      border: 1px solid #ddd;
      flex: 0 0 auto;
    }
    .twisty.hidden { visibility: hidden; }
    .label { font-size: 13px; color: #333; }
    .badge {
      margin-left: auto;
      font-size: 11px;
      color: #666;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 2px 8px;
    }

    /* Screen cards */
    .screen-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: .2s;
    }
    .screen-card:hover { border-color: #008cff; box-shadow: 0 2px 6px rgba(0,140,255,.12); }
    .screen-card.selected { border-color: #008cff; background: #e6f4ff; }
    .screen-thumb {
      height: 54px;
      border-radius: 6px;
      border: 1px dashed rgba(0,0,0,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: .08em;
      margin-bottom: 8px;
      user-select: none;
    }
    .op-登録 { background: #e6f4ff; color: #006bd6; border-color: rgba(0,107,214,.25); }
    .op-照会 { background: #e9fff1; color: #137a3a; border-color: rgba(19,122,58,.25); }
    .op-分析 { background: #f4e9ff; color: #6b2bbd; border-color: rgba(107,43,189,.25); }
    .op-未定義 { background: #f3f3f3; color: #666; border-color: rgba(0,0,0,.15); }
    .screen-title { font-size: 13px; font-weight: 700; color: #222; line-height: 1.25; }
    .screen-meta { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.15);
      background: #fff;
      color: #555;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pill strong { font-weight: 700; }

    /* Detail */
    .detail-header {
      background: #f0f0f0;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 12px;
      align-items: start;
    }

    .data-list {
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      background: #fafafa;
      padding: 10px;
      max-height: 520px;
      overflow: auto;
    }

    .data-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 8px;
      transition: .2s;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .data-item:hover { border-color: #008cff; background: #f0f8ff; }
    .data-item.active { border-color: #008cff; background: #e6f4ff; }
    .data-idx { font-weight: 700; color: #008cff; min-width: 34px; text-align: right; }
    .data-name { color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .form {
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .row label {
      font-size: 12px;
      color: #666;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .input {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }
    .input:focus {
      outline: none;
      border-color: #008cff;
      box-shadow: 0 0 0 2px rgba(0,140,255,.12);
    }

    .section {
      margin-top: 14px;
    }
    .section-title {
      background: #f0f0f0;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .access-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .entity { font-weight: 800; color: #333; }
    .crud {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .crud span {
      background: #e6f4ff;
      color: #008cff;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid rgba(0,140,255,.25);
    }
    .mainmark {
      background: #fff3cd;
      color: #8a6d1d;
      border: 1px solid rgba(138,109,29,.25);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .main { grid-template-columns: 1fr; }
      .tree-pane { border-right: none; border-bottom: 1px solid #e6e6e6; }
      .body-pane { grid-template-columns: 1fr; }
      .screen-list { border-right: none; border-bottom: 1px solid #ececec; }
      .detail-grid { grid-template-columns: 1fr; }
      .data-list { max-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="window-header">
      <div class="title">
        <strong>画面照会</strong>
        <span class="subtle">（`2_RDRASpec/画面照会.json` を参照）</span>
      </div>
      <button class="close-button" onclick="closeAndStopServer()">閉じる</button>
    </div>

    <div class="mode-tabs">
      <div class="tab active" id="tab-buc" onclick="setMode('buc')">BUC</div>
      <div class="tab" id="tab-actor" onclick="setMode('actor')">アクター</div>
    </div>

    <div class="main">
      <div class="tree-pane">
        <div id="treeRoot" class="tree"></div>
      </div>
      <div class="body-pane">
        <div class="screen-list" id="screenList"></div>
        <div class="screen-detail" id="screenDetail"></div>
      </div>
    </div>
  </div>

  <script>
    /** @type {any} */
    let ui = null;
    /** @type {Map<string, any>} */
    let screensByName = new Map();

    const state = {
      mode: 'buc', // 'buc' | 'actor'

      // BUCパネル選択
      selectedBusiness: null,
      selectedBuc: null,
      selectedActor: null,
      selectedNodeId: null,
      selectedNodeType: null, // 'business'|'buc'|'actor'|'group'

      // アクターパネル選択
      selectedGroup: null,
      selectedGroupActor: null,

      // 画面選択
      selectedScreenName: null,
      selectedScreenDataIndex: 0,

      // 展開状態
      expanded: new Map(), // nodeId -> boolean
    };

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c]));
    }

    function opClass(operation) {
      const op = String(operation || '未定義');
      if (op.includes('登録')) return 'op-登録';
      if (op.includes('照会')) return 'op-照会';
      if (op.includes('分析')) return 'op-分析';
      return 'op-未定義';
    }

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('tab-buc').classList.toggle('active', mode === 'buc');
      document.getElementById('tab-actor').classList.toggle('active', mode === 'actor');

      // 画面選択はモード切替でリセット（選択ノードに応じて再計算）
      state.selectedScreenName = null;
      state.selectedScreenDataIndex = 0;

      renderAll();
    }

    function getScreenOrPlaceholder(screenName) {
      const s = screensByName.get(screenName);
      if (s) return s;
      return {
        screen_name: screenName,
        operation: '未定義',
        fields: [],
        screen_datas: [],
        data_access: []
      };
    }

    function getCurrentActorScreenNames() {
      if (!ui) return [];
      if (state.mode === 'buc') {
        const b = ui.businesses?.find(x => x.business_name === state.selectedBusiness);
        const buc = b?.BUCs?.find(x => x.buc_name === state.selectedBuc);
        const a = buc?.actors?.find(x => x.actor_name === state.selectedActor);
        return a?.screen_names || [];
      } else {
        const g = ui.actorGroups?.find(x => x.group_name === state.selectedGroup);
        const a = g?.actors?.find(x => x.actor_name === state.selectedGroupActor);
        return a?.screen_names || [];
      }
    }

    function getSelectionHeader(screen) {
      const op = screen?.operation || '未定義';
      if (state.mode === 'buc') {
        const business = state.selectedBusiness ?? '';
        const buc = state.selectedBuc ?? '';
        const name = screen?.screen_name || '';
        return `業務: ${business} / BUC: ${buc} / 画面: ${name} / 機能: ${op}`;
      }
      // 方針A：業務/BUCは逆引きしない
      return `画面: ${screen?.screen_name || ''} / 機能: ${op}`;
    }

    function buildScreensIndex() {
      screensByName = new Map();
      for (const s of (ui?.screens || [])) {
        if (!s?.screen_name) continue;
        if (!screensByName.has(s.screen_name)) {
          screensByName.set(s.screen_name, s);
        }
      }
    }

    function ensureInitialSelection() {
      if (!ui) return;

      // 初期表示はBUCパネル
      state.mode = 'buc';

      // 展開：先頭の業務/BUCまで展開
      const firstBusiness = ui.businesses?.[0];
      const firstBuc = firstBusiness?.BUCs?.[0];
      const firstActor = firstBuc?.actors?.[0];

      state.selectedBusiness = firstBusiness?.business_name ?? null;
      state.selectedBuc = firstBuc?.buc_name ?? null;
      state.selectedActor = firstActor?.actor_name ?? null;

      // 「最初のアクターを選択状態」
      if (state.selectedBusiness && state.selectedBuc && state.selectedActor) {
        state.selectedNodeType = 'actor';
        state.selectedNodeId = nodeIdBucActor(state.selectedBusiness, state.selectedBuc, state.selectedActor);
      } else if (state.selectedBusiness && state.selectedBuc) {
        state.selectedNodeType = 'buc';
        state.selectedNodeId = nodeIdBuc(state.selectedBusiness, state.selectedBuc);
      } else if (state.selectedBusiness) {
        state.selectedNodeType = 'business';
        state.selectedNodeId = nodeIdBusiness(state.selectedBusiness);
      }

      if (state.selectedBusiness) state.expanded.set(nodeIdBusiness(state.selectedBusiness), true);
      if (state.selectedBusiness && state.selectedBuc) state.expanded.set(nodeIdBuc(state.selectedBusiness, state.selectedBuc), true);

      // アクターパネル側も初期選択を準備（ただし初期表示はBUC）
      const firstGroup = ui.actorGroups?.[0];
      const firstGroupActor = firstGroup?.actors?.[0];
      state.selectedGroup = firstGroup?.group_name ?? null;
      state.selectedGroupActor = firstGroupActor?.actor_name ?? null;
      if (state.selectedGroup) state.expanded.set(nodeIdGroup(state.selectedGroup), true);
    }

    function nodeIdBusiness(businessName) {
      return `b:${businessName}`;
    }
    function nodeIdBuc(businessName, bucName) {
      return `b:${businessName}|u:${bucName}`;
    }
    function nodeIdBucActor(businessName, bucName, actorName) {
      return `b:${businessName}|u:${bucName}|a:${actorName}`;
    }
    function nodeIdGroup(groupName) {
      return `g:${groupName}`;
    }
    function nodeIdGroupActor(groupName, actorName) {
      return `g:${groupName}|a:${actorName}`;
    }

    function toggleExpanded(nodeId) {
      state.expanded.set(nodeId, !state.expanded.get(nodeId));
      renderTree();
    }

    function selectNode({ nodeId, nodeType, business, buc, actor, group, groupActor }) {
      state.selectedNodeId = nodeId;
      state.selectedNodeType = nodeType;

      if (state.mode === 'buc') {
        state.selectedBusiness = business ?? null;
        state.selectedBuc = buc ?? null;
        state.selectedActor = actor ?? null;
      } else {
        state.selectedGroup = group ?? null;
        state.selectedGroupActor = groupActor ?? null;
      }

      // 選択ノードが「業務/BUC/アクター群」のときはボディはブランク
      state.selectedScreenName = null;
      state.selectedScreenDataIndex = 0;

      renderAll();
    }

    function renderTree() {
      const root = document.getElementById('treeRoot');
      root.innerHTML = '';

      const tree = document.createElement('div');
      tree.className = 'tree';

      if (!ui) {
        tree.innerHTML = '<div class="empty">データ未読込</div>';
        root.appendChild(tree);
        return;
      }

      if (state.mode === 'buc') {
        tree.appendChild(renderTreeBuc());
      } else {
        tree.appendChild(renderTreeActor());
      }

      root.appendChild(tree);
    }

    function renderTreeBuc() {
      const ul = document.createElement('ul');
      const businesses = ui.businesses || [];

      businesses.forEach((b) => {
        const businessName = b.business_name;
        const bId = nodeIdBusiness(businessName);
        const isExpanded = !!state.expanded.get(bId);
        const hasChildren = (b.BUCs || []).length > 0;

        const li = document.createElement('li');
        li.appendChild(renderNode({
          nodeId: bId,
          label: businessName,
          nodeType: 'business',
          twisty: hasChildren ? (isExpanded ? '▾' : '▸') : null,
          badge: '業務',
          selected: state.selectedNodeId === bId,
          onTwisty: () => toggleExpanded(bId),
          onClick: () => selectNode({ nodeId: bId, nodeType: 'business', business: businessName }),
        }));

        if (hasChildren && isExpanded) {
          const ulBuc = document.createElement('ul');
          (b.BUCs || []).forEach((u) => {
            const bucName = u.buc_name;
            const uId = nodeIdBuc(businessName, bucName);
            const uExpanded = !!state.expanded.get(uId);
            const hasActors = (u.actors || []).length > 0;

            const liBuc = document.createElement('li');
            liBuc.appendChild(renderNode({
              nodeId: uId,
              label: bucName,
              nodeType: 'buc',
              twisty: hasActors ? (uExpanded ? '▾' : '▸') : null,
              badge: 'BUC',
              selected: state.selectedNodeId === uId,
              onTwisty: () => toggleExpanded(uId),
              onClick: () => selectNode({ nodeId: uId, nodeType: 'buc', business: businessName, buc: bucName }),
            }));

            if (hasActors && uExpanded) {
              const ulActor = document.createElement('ul');
              (u.actors || []).forEach((a) => {
                const actorName = a.actor_name;
                const aId = nodeIdBucActor(businessName, bucName, actorName);
                const liActor = document.createElement('li');
                liActor.appendChild(renderNode({
                  nodeId: aId,
                  label: actorName,
                  nodeType: 'actor',
                  twisty: null,
                  badge: 'アクター',
                  selected: state.selectedNodeId === aId,
                  onTwisty: null,
                  onClick: () => selectNode({
                    nodeId: aId,
                    nodeType: 'actor',
                    business: businessName,
                    buc: bucName,
                    actor: actorName
                  }),
                }));
                ulActor.appendChild(liActor);
              });
              liBuc.appendChild(ulActor);
            }

            ulBuc.appendChild(liBuc);
          });
          li.appendChild(ulBuc);
        }

        ul.appendChild(li);
      });

      return ul;
    }

    function renderTreeActor() {
      const ul = document.createElement('ul');
      const groups = ui.actorGroups || [];

      groups.forEach((g) => {
        const groupName = g.group_name;
        const gId = nodeIdGroup(groupName);
        const isExpanded = !!state.expanded.get(gId);
        const hasChildren = (g.actors || []).length > 0;

        const li = document.createElement('li');
        li.appendChild(renderNode({
          nodeId: gId,
          label: groupName,
          nodeType: 'group',
          twisty: hasChildren ? (isExpanded ? '▾' : '▸') : null,
          badge: 'アクター群',
          selected: state.selectedNodeId === gId,
          onTwisty: () => toggleExpanded(gId),
          onClick: () => selectNode({ nodeId: gId, nodeType: 'group', group: groupName }),
        }));

        if (hasChildren && isExpanded) {
          const ulActor = document.createElement('ul');
          (g.actors || []).forEach((a) => {
            const actorName = a.actor_name;
            const aId = nodeIdGroupActor(groupName, actorName);
            const liActor = document.createElement('li');
            liActor.appendChild(renderNode({
              nodeId: aId,
              label: actorName,
              nodeType: 'actor',
              twisty: null,
              badge: 'アクター',
              selected: state.selectedNodeId === aId,
              onTwisty: null,
              onClick: () => selectNode({ nodeId: aId, nodeType: 'actor', group: groupName, groupActor: actorName }),
            }));
            ulActor.appendChild(liActor);
          });
          li.appendChild(ulActor);
        }

        ul.appendChild(li);
      });

      return ul;
    }

    function renderNode({ nodeId, label, nodeType, twisty, badge, selected, onTwisty, onClick }) {
      const row = document.createElement('div');
      row.className = 'node' + (selected ? ' selected' : '');

      const t = document.createElement('span');
      t.className = 'twisty' + (twisty ? '' : ' hidden');
      t.textContent = twisty || ' ';
      if (onTwisty) {
        t.onclick = (e) => { e.stopPropagation(); onTwisty(); };
      }

      const l = document.createElement('span');
      l.className = 'label';
      l.textContent = label;

      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = badge;

      row.appendChild(t);
      row.appendChild(l);
      row.appendChild(b);
      row.onclick = () => onClick();
      row.dataset.nodeId = nodeId;
      row.dataset.nodeType = nodeType;
      return row;
    }

    function renderScreenList() {
      const root = document.getElementById('screenList');
      root.innerHTML = '';

      const canShow =
        (state.mode === 'buc' && state.selectedNodeType === 'actor' && state.selectedActor) ||
        (state.mode === 'actor' && state.selectedNodeType === 'actor' && state.selectedGroupActor);

      if (!canShow) {
        root.innerHTML = '<div class="empty">左のツリーからアクターを選択してください</div>';
        return;
      }

      const names = getCurrentActorScreenNames();
      if (!names.length) {
        root.innerHTML = '<div class="empty">このアクターに対応する画面がありません</div>';
        return;
      }

      names.forEach((name) => {
        const screen = getScreenOrPlaceholder(name);
        const card = document.createElement('div');
        card.className = 'screen-card' + (state.selectedScreenName === name ? ' selected' : '');
        card.onclick = () => {
          state.selectedScreenName = name;
          state.selectedScreenDataIndex = 0; // 初期表示：先頭行選択
          renderScreenList();
          renderScreenDetail();
        };

        const thumb = document.createElement('div');
        thumb.className = 'screen-thumb ' + opClass(screen.operation);
        thumb.textContent = String(screen.operation || '未定義');

        const title = document.createElement('div');
        title.className = 'screen-title';
        title.textContent = screen.screen_name || name;

        const meta = document.createElement('div');
        meta.className = 'screen-meta';
        meta.innerHTML = `<span class="pill"><strong>機能</strong> ${esc(screen.operation || '未定義')}</span>`;

        card.appendChild(thumb);
        card.appendChild(title);
        card.appendChild(meta);
        root.appendChild(card);
      });

      // 初期表示時に先頭画面を自動選択（まだ未選択なら）
      if (!state.selectedScreenName && names.length) {
        state.selectedScreenName = names[0];
        state.selectedScreenDataIndex = 0;
        renderScreenList();
      }
    }

    function buildValueMapFromDummyData(dummyData) {
      const m = new Map();
      for (const row of (dummyData || [])) {
        if (!row || !row.項目名) continue;
        m.set(row.項目名, row.値);
      }
      return m;
    }

    function inferSelectOptions(screen, fieldName) {
      const values = new Set();
      for (const sd of (screen.screen_datas || [])) {
        for (const dd of (sd.dummy_data || [])) {
          if (dd?.項目名 === fieldName && dd?.値 != null && String(dd.値).trim() !== '') {
            values.add(String(dd.値));
          }
        }
      }
      return Array.from(values);
    }

    function inputKind(field) {
      const name = String(field?.項目名 || '');
      const t = String(field?.type || '').toLowerCase();
      if (t === 'number') return 'number';
      if (t === 'date') return 'date';
      if (name.includes('日')) return 'date';
      if (String(field?.type || '') === 'バリエーション') return 'select';
      return 'text';
    }

    function renderScreenDetail() {
      const root = document.getElementById('screenDetail');
      root.innerHTML = '';

      const canShow =
        (state.mode === 'buc' && state.selectedNodeType === 'actor' && state.selectedActor) ||
        (state.mode === 'actor' && state.selectedNodeType === 'actor' && state.selectedGroupActor);

      if (!canShow) {
        root.innerHTML = '<div class="empty">左のツリーからアクターを選択してください</div>';
        return;
      }

      const names = getCurrentActorScreenNames();
      if (!names.length) {
        root.innerHTML = '<div class="empty">このアクターに対応する画面がありません</div>';
        return;
      }

      const screenName = state.selectedScreenName || names[0];
      const screen = getScreenOrPlaceholder(screenName);

      const header = document.createElement('div');
      header.className = 'detail-header';
      header.textContent = getSelectionHeader(screen);
      root.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'detail-grid';

      // 画面データ一覧
      const list = document.createElement('div');
      list.className = 'data-list';

      const sds = screen.screen_datas || [];
      if (!sds.length) {
        list.innerHTML = '<div class="empty" style="padding:18px 6px;">画面データがありません</div>';
      } else {
        sds.forEach((sd, idx) => {
          const item = document.createElement('div');
          item.className = 'data-item' + (idx === state.selectedScreenDataIndex ? ' active' : '');
          item.onclick = () => {
            state.selectedScreenDataIndex = idx;
            renderScreenDetail();
          };
          const i = document.createElement('span');
          i.className = 'data-idx';
          i.textContent = String(idx + 1).padStart(3, '0');
          const n = document.createElement('span');
          n.className = 'data-name';
          n.textContent = sd.display_name || '(no name)';
          item.appendChild(i);
          item.appendChild(n);
          list.appendChild(item);
        });
      }
      grid.appendChild(list);

      // 画面（fields）
      const formWrap = document.createElement('div');
      formWrap.className = 'form';

      const selectedSd = sds[state.selectedScreenDataIndex] || null;
      const valueMap = buildValueMapFromDummyData(selectedSd?.dummy_data || []);

      if (!screen.fields || !screen.fields.length) {
        formWrap.innerHTML = '<div class="empty" style="padding:18px 6px;">fields がありません（未定義画面）</div>';
      } else {
        screen.fields.forEach((f) => {
          const row = document.createElement('div');
          row.className = 'row';

          const label = document.createElement('label');
          label.title = f.tooltip || '';
          label.textContent = f.項目名;

          const kind = inputKind(f);
          const currentValue = valueMap.get(f.項目名) ?? '';

          let input;
          if (kind === 'select') {
            input = document.createElement('select');
            input.className = 'input';
            const blank = document.createElement('option');
            blank.value = '';
            blank.textContent = '-- 選択 --';
            input.appendChild(blank);
            const opts = inferSelectOptions(screen, f.項目名);
            opts.forEach((v) => {
              const opt = document.createElement('option');
              opt.value = v;
              opt.textContent = v;
              input.appendChild(opt);
            });
            input.value = String(currentValue);
          } else {
            input = document.createElement('input');
            input.className = 'input';
            input.type = kind;
            input.placeholder = f.tooltip || f.type || '';
            input.value = String(currentValue);
          }

          row.appendChild(label);
          row.appendChild(input);
          formWrap.appendChild(row);
        });
      }

      // データアクセス（data_access）
      const accessSection = document.createElement('div');
      accessSection.className = 'section';
      accessSection.innerHTML = '<div class="section-title">データアクセス</div>';

      const da = screen.data_access || [];
      if (!da.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.style.padding = '16px 6px';
        empty.textContent = 'data_access がありません';
        accessSection.appendChild(empty);
      } else {
        da.forEach((a) => {
          const item = document.createElement('div');
          item.className = 'access-item';

          const entity = document.createElement('span');
          entity.className = 'entity';
          entity.textContent = a.entity || '(no entity)';

          const crud = document.createElement('span');
          crud.className = 'crud';
          (a.CRUD || []).forEach((c) => {
            const s = document.createElement('span');
            s.textContent = c;
            crud.appendChild(s);
          });

          item.appendChild(entity);
          item.appendChild(crud);
          if (a.isMain) {
            const m = document.createElement('span');
            m.className = 'mainmark';
            m.textContent = 'MAIN';
            item.appendChild(m);
          }
          accessSection.appendChild(item);
        });
      }

      // 組み立て
      const right = document.createElement('div');
      right.appendChild(formWrap);
      right.appendChild(accessSection);
      grid.appendChild(right);

      root.appendChild(grid);
    }

    function renderAll() {
      renderTree();
      renderScreenList();
      renderScreenDetail();
    }

    async function initializeApp() {
      try {
        const res = await fetch('/ui.json', { cache: 'no-store' });
        ui = await res.json();
        buildScreensIndex();
        ensureInitialSelection();
        // 初期表示：BUCパネル、最初のアクター選択状態
        renderAll();
      } catch (e) {
        console.error(e);
        document.getElementById('treeRoot').innerHTML = '<div class="empty">データの読み込みに失敗しました</div>';
        document.getElementById('screenList').innerHTML = '<div class="empty">データの読み込みに失敗しました</div>';
        document.getElementById('screenDetail').innerHTML = '<div class="empty">データの読み込みに失敗しました</div>';
      }
    }

    async function closeAndStopServer() {
      if (!confirm('サーバーを停止して画面を閉じますか？')) return;
      try {
        await fetch('/shutdown');
        setTimeout(() => {
          window.close();
          document.body.innerHTML = '<div style="text-align:center; padding:50px; font-size:18px;">サーバーが停止しました。<br>このタブを閉じてください。</div>';
        }, 200);
      } catch (e) {
        console.error(e);
        alert('サーバーの停止に失敗しました。メニューから手動で停止してください。');
      }
    }

    initializeApp();
  </script>
</body>
</html>
